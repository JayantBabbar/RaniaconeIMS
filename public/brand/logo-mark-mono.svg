<!--
  RaniacOne — single-color monogram (no plate).
  Use this where you need the mark in one ink: stamps, embossing,
  watermarks, partner badges, monochrome print. Fill is currentColor
  so the consumer chooses the ink.
-->
<svg width="40" height="32" viewBox="0 0 40 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RaniacOne">
  <title>RaniacOne</title>
  <g fill="currentColor">
    <path fill-rule="evenodd" d="M 0 0 L 14 0 Q 24 0 24 11 Q 24 18 18 21 L 24 32 L 16 32 L 11 22 L 6 22 L 6 32 L 0 32 Z M 6 6 L 13 6 Q 18 6 18 11 Q 18 16 13 16 L 6 16 Z"/>
    <path d="M 28 5 L 32 0 L 36 0 L 36 32 L 32 32 L 32 4 Z"/>
  </g>
</svg>
